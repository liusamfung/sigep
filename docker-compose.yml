services:
  postgres:
    image: postgres:15-alpine
    container_name: sigep-postgres
    environment:
      POSTGRES_USER: sigep_user
      POSTGRES_PASSWORD: sigep_password
      POSTGRES_DB: sigep_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
